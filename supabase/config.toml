# JChat 3.0 — Supabase project config
# Links the CLI to the project and sets per-function JWT verification so
# `supabase functions deploy` picks up the right flags automatically.

project_id = "klfsgcfoahdtkojyqspd"

# App-invoked functions: called from the client with a Supabase JWT → verify.
[functions.payments]
verify_jwt = true

[functions.stripe-connect]
verify_jwt = true

# Stripe-invoked webhooks: called by Stripe with NO Supabase JWT (they verify
# the Stripe signature instead) → JWT verification must be off.
[functions.stripe-webhook]
verify_jwt = false

[functions.subscriptions]
verify_jwt = false

# Public tab-payment page: the customer paying via QR may have no account, so this
# is called WITHOUT a JWT. Protected by the opaque pay_token + acting only on a
# 'pending' card payment (same model as the webhook). Does NOT lower payments'.
[functions.tab-pay]
verify_jwt = false

# Public guest checkout (G1): a walk-in with no account pays from the menu. Called
# WITHOUT a JWT; the bot defence is server-side hCaptcha (not anonymous sessions —
# see D-39). Does NOT lower payments'.
[functions.guest-pay]
verify_jwt = false
